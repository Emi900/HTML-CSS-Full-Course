<html lang="en">
<head>

</head>
<body>
    <a class="Amazon" href="https://www.amazon.com/" target="_blank">Back to Amazon</a> 
    <p class="Shoes">Nike Black Running Shoes</p>
    <p class="stock">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
    <p><button class="Cart" > Add to cart</button> <button class="Buy">Buy now</button></p>
  <style>
        .stock{
            color: rgb(0, 118, 0);
        }
        .Amazon{
            color: rgb(0, 113, 133);
        }
        .Cart{
            font-size: 15px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: rgb(255, 216,20);
            color: black;
            height: 30px; /* inaltimea*/

            border-radius: 30px;

            border-color: rgb(2, 2, 2);

            border-width: 1px;
        }
        .Buy{
            font-size: 15px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: rgb(255, 164,28);
            color: black;
            height: 30px; /* inaltimea*/
            width: 125px; /* lungimea*/
            border: none;
            border-radius: 30px;
            cursor: pointer;
            border-color: rgb(2, 2, 2);
            border-style: none;
            border-width: 1px;
        }
        .Shoes{

            color: black;
